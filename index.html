<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Frikk Jarl — Creative Developer">
<meta name="color-scheme" content="dark light">
<title>Frikk Jarl — Creative Developer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  :root {
    /* dark is the default — the storm was designed on black. --is-dark flips
       the JS palette (light glyphs on black ⇄ dark ink on paper). */
    --bg: #050505;
    --ink: #f2f2f2;
    --dim: #8a8a8a;
    --rule: #2a2a2a;
    --is-dark: 1;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f3f2ef; --ink: #141414; --dim: #5c5c5c; --rule: #d3d1cb; --is-dark: 0; }
  }
  :root[data-theme="dark"]  { --bg: #050505; --ink: #f2f2f2; --dim: #8a8a8a; --rule: #2a2a2a; --is-dark: 1; }
  :root[data-theme="light"] { --bg: #f3f2ef; --ink: #141414; --dim: #5c5c5c; --rule: #d3d1cb; --is-dark: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    display: flex;
    overflow: hidden;
  }
  .card {
    flex: 0 0 40%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 6vw;
    position: relative; /* so z-index wins — the full-screen canvas must not cover the card/button */
    z-index: 1;
    pointer-events: none; /* clicks fall through to the sky (cloud-tap lightning); buttons re-enable */
  }
  .cardbox {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    width: max-content;
    max-width: 100%;
  }
  .card .rule { width: 40px; height: 1px; background: var(--rule); }
  h1 {
    font-size: clamp(1.9rem, 3.4vw, 3.2rem);
    font-weight: 500;
    letter-spacing: 0.01em;
    text-wrap: balance;
    line-height: 1.0;
  }
  .role {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.35em;
    color: var(--dim);
  }
  .role .cursor {
    display: inline-block;
    width: 0.55em; height: 1em;
    margin-left: 0.45em;
    vertical-align: text-bottom;
    background: var(--dim);
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .role .cursor { animation: none; } }
  #strike {
    align-self: flex-start;
    margin-top: 0.9rem;
    font: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--dim);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 0.9em 1.3em 0.9em 1.6em;
    cursor: pointer;
    pointer-events: auto;
    /* the button stands 4px proud of the page — a real keycap with a ledge */
    box-shadow: 0 4px 0 -1px var(--rule), 0 5px 6px -2px rgba(0,0,0,0.5);
    transform: translateY(0);
    transition: color 0.13s, border-color 0.13s, background 0.13s,
                transform 0.11s cubic-bezier(0.3, 1.5, 0.6, 1),
                box-shadow 0.11s cubic-bezier(0.3, 1.5, 0.6, 1);
  }
  /* hover: it rises, tenses, turns solid ink — anticipation before the press */
  #strike:hover {
    color: var(--bg); background: var(--ink); border-color: var(--ink);
    transform: translateY(-1px);
    box-shadow: 0 6px 0 -1px var(--ink), 0 8px 10px -2px rgba(0,0,0,0.55);
  }
  /* press / charge: it SLAMS down flat onto the page, the ledge collapses */
  #strike:active, #strike.charging {
    transform: translateY(5px);
    box-shadow: 0 0 0 -1px var(--ink), 0 0 0 0 rgba(0,0,0,0);
    transition: transform 0.04s ease-out, box-shadow 0.04s ease-out,
                color 0.13s, background 0.13s, border-color 0.13s;
  }
  #strike .key {
    display: inline-block; margin-left: 0.7em;
    font-size: 0.82em; letter-spacing: 0.12em;
    padding: 0.15em 0.75em; border: 1px solid currentColor; border-radius: 3px;
    border-bottom-width: 2px; opacity: 0.75; transform: translateY(-1px);
  }
  /* charging: the keycap looks pressed but stays fully legible — a filled key
     in the theme base shade against the inverted button face (never the
     button's own text colour, which would make it vanish) */
  #strike.charging .key { background: var(--bg); color: var(--ink); border-color: var(--bg); opacity: 1; }
  #ever {
    margin: 0.55rem 0 0; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.28em;
    color: var(--dim); opacity: 0.8;
  }
  #evern { transition: color 0.3s; }
  #meter {
    margin: 0.6rem 0 0; font-size: 11px; line-height: 1;
    letter-spacing: 0.14em; user-select: none; white-space: nowrap;
  }
  #mempty { color: var(--rule); transition: color 0.2s; }
  #strike:focus-visible { outline: 1px solid var(--ink); outline-offset: 3px; }
  #theme {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 1.1rem);
    right: 1.3rem;
    z-index: 3;
    font: inherit; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.28em;
    color: var(--dim); background: none; border: none;
    padding: 0.5em; cursor: pointer; opacity: 0.7;
    transition: opacity 0.15s, color 0.15s;
  }
  #theme::before { content: "◐ "; }
  #theme:hover { opacity: 1; color: var(--ink); }
  #theme:focus-visible { outline: 1px solid var(--ink); outline-offset: 3px; }
  #powered {
    position: fixed;
    left: 1.3rem;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 1.1rem);
    z-index: 3;
    font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.28em;
    color: var(--dim); text-decoration: none;
    opacity: 0.55; transition: opacity 0.15s, color 0.15s;
  }
  #powered strong { font-weight: 600; color: inherit; }
  #powered:hover { opacity: 1; color: var(--ink); }
  #powered:focus-visible { outline: 1px solid var(--ink); outline-offset: 3px; }
  #hud {
    position: fixed;
    right: 1.3rem;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 1.1rem);
    z-index: 3;
    font-size: 10px; line-height: 1.7;
    text-transform: uppercase; letter-spacing: 0.24em;
    color: var(--dim); opacity: 0.62; text-align: right;
    user-select: none; pointer-events: none;
  }
  #hstat { font-variant-numeric: tabular-nums; }
  #hpeeps { display: flex; align-items: center; justify-content: flex-end; gap: 0.5em; margin-top: 0.25em; }
  #hdots { display: inline-flex; flex-wrap: wrap; justify-content: flex-end; gap: 3px; max-width: 150px; }
  #hdots i {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; box-shadow: 0 0 5px currentColor;
  }
  #hdots i.me { outline: 1px solid var(--ink); outline-offset: 1px; }
  .stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; }
  #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; }
  /* the landing gate: a clean white screen you press SPACE to leave, dropping
     into the dark storm behind it */
  #intro {
    position: fixed; inset: 0; z-index: 20;
    background: #f3f2ef; color: #141414;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.7s ease;
  }
  #intro.gone { opacity: 0; pointer-events: none; }
  .introbox { display: flex; flex-direction: column; align-items: center; gap: 2.2rem; padding: 0 8vw; }
  .introname {
    margin: 0; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 500; letter-spacing: 0.02em;
  }
  #enter {
    font: inherit; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.34em;
    color: #141414; background: #f3f2ef;
    border: 1px solid #141414; border-radius: 5px;
    padding: 1.1em 1.8em 1.1em 2.1em; cursor: pointer;
    box-shadow: 0 5px 0 -1px #c9c7c0, 0 7px 10px -3px rgba(0,0,0,0.25);
    transform: translateY(0);
    transition: transform 0.12s cubic-bezier(0.3,1.5,0.6,1), box-shadow 0.12s cubic-bezier(0.3,1.5,0.6,1),
                color 0.13s, background 0.13s;
  }
  #enter:hover {
    color: #f3f2ef; background: #141414;
    transform: translateY(-1px); box-shadow: 0 7px 0 -1px #141414, 0 10px 12px -3px rgba(0,0,0,0.3);
  }
  #enter:active, #enter.charging {
    transform: translateY(6px);
    box-shadow: 0 0 0 -1px #141414, 0 0 0 0 rgba(0,0,0,0);
    transition: transform 0.04s ease-out, box-shadow 0.04s ease-out, color 0.13s, background 0.13s;
  }
  #enter .key {
    display: inline-block; margin-left: 0.8em; font-size: 0.82em; letter-spacing: 0.12em;
    padding: 0.15em 0.8em; border: 1px solid currentColor; border-radius: 3px;
    border-bottom-width: 2px; opacity: 0.75; transform: translateY(-1px);
  }
  #enter.charging .key { background: #f3f2ef; color: #141414; border-color: #f3f2ef; opacity: 1; }
  #enter:focus-visible { outline: 1px solid #141414; outline-offset: 3px; }
  /* Phones, portrait: the funnel bends around the name */
  @media (max-width: 760px) and (orientation: portrait) {
    .card {
      position: fixed; inset: 0; flex: none;
      padding: 0 8vw;
      pointer-events: none;
    }
    .cardbox { gap: 0.7rem; }
  }
  /* Phones, landscape: keep the split but tighten the card padding */
  @media (max-height: 500px) {
    .card { padding: 0 5vw; flex-basis: 44%; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="cardbox">
    <div class="rule"></div>
    <h1>Frikk Jarl</h1>
    <p class="role" aria-label="Creative Developer"><span id="rolewords" aria-hidden="true">Creative Developer</span><span class="cursor"></span></p>
    <button id="strike" type="button">create lightning <kbd class="key">space</kbd></button>
    <div id="meter" aria-hidden="true" hidden><span id="mfill"></span><span id="mrisk"></span><span id="mhead"></span><span id="mempty"></span></div>
    <p id="ever" aria-live="off" hidden>⚡ <span id="evern">—</span> strikes ever</p>
  </div>
</div>
<button id="theme" type="button" aria-label="Toggle light or dark theme"></button>
<a id="powered" href="https://barkpark.cloud" target="_blank" rel="noopener">powered by <strong>barkpark</strong> realtime</a>
<div id="hud" aria-hidden="true" hidden>
  <div id="hstat"><span id="hping">—</span> · <span id="hfps">—</span></div>
  <div id="hpeeps"><span id="hdots"></span><span id="hcount"></span></div>
</div>
<div class="stage"><canvas id="c" aria-hidden="true"></canvas></div>
<div id="flash" aria-hidden="true"></div>
<div id="intro">
  <div class="introbox">
    <p class="introname">Frikk Jarl</p>
    <button id="enter" type="button">enter the storm <kbd class="key">space</kbd></button>
  </div>
</div>

<script>
'use strict';
// ---------- value noise + fbm ----------
function hash(ix, iy) {
  let h = (ix * 374761393 + iy * 668265263) | 0;
  h = Math.imul(h ^ (h >>> 13), 1274126177);
  return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
}
function smooth(a, b, u) { return a + (b - a) * u * u * (3 - 2 * u); }
function noise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y), fx = x - ix, fy = y - iy;
  return smooth(
    smooth(hash(ix, iy),     hash(ix + 1, iy),     fx),
    smooth(hash(ix, iy + 1), hash(ix + 1, iy + 1), fx),
    fy
  );
}
function fbm(x, y) {
  return (noise(x, y) * 0.5 + noise(x * 2.03, y * 2.03) * 0.25 +
          noise(x * 4.01, y * 4.01) * 0.125 + noise(x * 8.05, y * 8.05) * 0.0625) / 0.9375;
}
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const TAU = Math.PI * 2;
const sstep = (e0, e1, v) => { const u = clamp((v - e0) / (e1 - e0), 0, 1); return u * u * (3 - 2 * u); };
const lerp = (a, b, u) => a + (b - a) * u;

// ---------- monochrome glyph ramp ----------
const RAMP = ' (tjxucXUCQOmqdkao&%$';
const N = RAMP.length;
// luminances are authored for DARK mode (light glyphs on black); light mode
// flips luminance to dark ink on paper via tone(). One source, two themes.
let INVERT = false;
// dark mode: luminance as authored. light mode: flip to ink-on-paper (clouds
// are dropped entirely in light mode, so this only tones the vortex/lightning).
const tone = v => INVERT ? 255 - v : v;
const g = v => { v = tone(v); return `rgb(${v},${v},${v})`; };
// each visit draws a random accent hue: the name and every DISCHARGE (bolts,
// lit clouds, sparks, cursor buzz) carry it — the storm itself stays B&W.
// Saturation tapers at the extremes so white-hot stays near-white.
const HUE = Math.floor(Math.random() * 360);
const acH = (h, v, s = 75) => { // any hue — remote visitors' strikes render in THEIRS
  const tv = clamp(Math.round(tone(v)), 0, 255);
  const sat = Math.round(s * (1 - Math.abs(tv - 140) / 140 * 0.6));
  return `hsl(${h} ${sat}% ${Math.round(tv / 255 * 100)}%)`;
};
const ac = (v, s = 75) => acH(HUE, v, s);
const COLOR_LUM = Array.from({ length: N }, (_, i) => Math.round(lerp(0x1d, 0xf4, Math.pow(i / (N - 1), 0.9))));
const DUST_LUM = 0x15;
let COLORS = [], DUST = '';
// 18 parallax decks, GENERATED far→near: 11 behind the vortex (0-10) and 7 in
// front (11-17). Smaller cloud features, more of them, finer depth steps.
// Each deck: [xScale, xSpeed, yScale, ySpeed, seed, threshold, reach0, reach1, lightGain]
// lightGain = how much of any light (vortex, lightning, hover) this deck catches.
// Front decks carry raised thresholds: rare fast sweeps, not constant cover.
const NDECKS = 32, FRONT_START = 19;
const DK = Array.from({ length: NDECKS }, (_, i) => {
  if (i < FRONT_START) { // behind the vortex: slow deep haze → active storm layer
    // NEGATIVE x-speed = drifts RIGHT — the back of the rotating column, moving
    // opposite the front scud (which streams left), so the sky turns WITH the vortex
    const u = i / (FRONT_START - 1), e = u * u;
    return [lerp(8.0, 2.4, u), lerp(-0.016, -0.48, e), lerp(7.5, 3.0, u), lerp(-0.007, 0.042, e),
            11 + i * 41, lerp(0.435, 0.60, e), lerp(0.10, 0.03, u), lerp(0.64, 0.30, u), lerp(0.22, 0.90, u)];
  }
  const u = (i - FRONT_START) / (NDECKS - 1 - FRONT_START); // in front: sparse fast scud
  // two front populations, both sparse and hugging the vortex plane:
  //  - most decks: tiny fast wisps (high frequency, high coverage threshold)
  //  - the last few (nearest): occasional LARGER shapes, rarer still
  const big = u > 0.75, v = big ? (u - 0.75) / 0.25 : u / 0.75;
  // perspective sanity: a SMALL cloud close to the camera reads wrong. So the
  // wisp decks taper — the nearer a wisp deck sits, the rarer its clouds get
  // (near-zero at the top) and the larger any survivor is; the truly close
  // decks carry only the BIG masses.
  const fx  = big ? lerp(2.0, 1.3, v) : lerp(7.0, 3.6, v);
  const fy  = big ? lerp(2.7, 1.9, v) : lerp(9.2, 4.8, v);
  const cov = big ? lerp(0.74, 0.77, v) : lerp(0.76, 0.87, v);
  return [fx, lerp(0.55, 1.05, u), fy, lerp(0.045, 0.070, u),
          11 + i * 41, cov, 0.03, lerp(0.32, 0.16, u), lerp(0.95, 1.20, u)];
});
// per-deck glyphs (wisp→dense) and luminances, derived from depth
const TIER_F = [0.38, 0.60, 0.80, 1]; // wider spread: deeper shadows, brighter crests
const CLOUD_CH = [], CLOUD_LUM = [];
for (let i = 0; i < NDECKS; i++) {
  const u = i / (NDECKS - 1);
  const chars = i >= FRONT_START ? ['x', 'u', 'c', 'o']
              : u < 0.25 ? ['(', '(', 't', 'x']
              : u < 0.45 ? ['(', 't', 'x', 'u']
              : ['t', 'x', 'u', 'c'];
  const uf = i >= FRONT_START ? (i - FRONT_START) / (NDECKS - 1 - FRONT_START) : 0;
  let dense = i >= FRONT_START
    // small front wisps sit QUIET (dim); only the big nearest decks run bright
    ? Math.round(uf > 0.75 ? lerp(116, 140, (uf - 0.75) / 0.25) : lerp(84, 100, uf / 0.75))
    : Math.round(lerp(22, 112, Math.pow(i / (FRONT_START - 1), 1.15)));
  // darker and lighter SKIES: each deck rolls its own tone — some decks run
  // deep and brooding, some pale — widening the sky's contrast range
  dense = Math.round(dense * (0.72 + 0.56 * hash(i * 3 + 1, 977)));
  // the vortex's own glow: decks whose z sits near the vortex plane run a bit
  // lighter, fading with z-distance on BOTH sides — the funnel lights its sky
  dense += Math.round(34 * Math.exp(-(((i - (FRONT_START - 0.5)) * 8 / NDECKS) ** 2) / 1.6));
  for (let k = 0; k < 4; k++) {
    CLOUD_CH.push(chars[k]);
    CLOUD_LUM.push(Math.max(6, Math.round(dense * TIER_F[k])));
  }
}
const CBASE = NDECKS * 4;     // lit buckets start after all base tiers
const ZS = 8 / NDECKS;        // z-distances in "classic 8-deck" units, so the
                              // lighting falloffs keep their tuned visual spread
let CLOUD_C = []; // themed cloud colors, rebuilt on theme change

// lit-cloud ramp: a strike brightens each cloud FROM ITS OWN base shade into
// this fine ramp, so depth/density differences survive being lit — a dense
// cloud lit stays brighter than a wisp lit at the same distance.
const LITN = 24; // finer + wider: near-black silhouette up to white-hot
const LIT_LUM = Array.from({ length: LITN }, (_, k) => Math.round(lerp(4, 230, k / (LITN - 1))));
const LIT_CH = Array.from({ length: LITN }, (_, k) => RAMP[clamp(Math.round(lerp(4, 18, k / (LITN - 1))), 1, N - 1)]);
let LIT_C = []; // white lit ramp (ambient); hued lighting renders per-hue via acH

// rebuild every canvas color for the current theme (dark = as authored,
// light = luminance-flipped to ink-on-paper)
function rebuildPalette() {
  COLORS = COLOR_LUM.map(g);
  CLOUD_C = CLOUD_LUM.map(g);
  LIT_C = LIT_LUM.map(g); // ambient lightning lights clouds WHITE; hued light via acH per bin
  DUST = g(DUST_LUM);
}

// one shared cloud field — the renderer and the bolt spawner must agree on
// where cloud exists. Returns via scratch to avoid per-cell allocation.
// deck speed = parallax base (how close to the VIEWER) × storm boost (how
// close in z-depth to the VORTEX's own plane, which sits between decks 5 and
// 6). Adjacent decks ride the rotation hardest; the boost tapers with
// z-distance in both directions. Constant per deck — uniform drift, no shear.
const VORTEX_Z = FRONT_START - 0.5; // the vortex plane sits between decks 10 and 11
const DECK_SPEED = DK.map((p, i) => 1 + 0.8 / (1 + Math.abs(i - VORTEX_Z) * ZS));
// perspective for the cursor spotlight: a spot on a NEAR deck (front scud,
// high index) is large; on a FAR deck (deep back haze, low index) it shrinks
// like distance — the spotlight reads as living at the cloud's own depth.
const DEPTH_SCALE = DK.map((p, i) => lerp(0.40, 1.15, i / (NDECKS - 1)));
// nearest visible deck under a cell (the occlusion winner), or -1 if bare sky
function winDeckAt(col, row) {
  if (row / ROWS >= 0.66) return -1;
  const D = cloudDecks(col / COLS, row / ROWS, t);
  for (let i = D.length - 1; i >= 0; i--) if (D[i] > 0.012) return i;
  return -1;
}

const DECKS = new Array(DK.length).fill(0);
function cloudDecks(colN, rowN, tt) {
  for (let i = 0; i < DK.length; i++) {
    const p = DK[i];
    if (rowN >= p[7]) { DECKS[i] = 0; continue; }
    const s = DECK_SPEED[i];
    DECKS[i] = (fbm(colN * p[0] + tt * p[1] * s, rowN * p[2] + tt * p[3] * s + p[4]) - p[5]) *
               (1 - sstep(p[6], p[7], rowN));
  }
  return DECKS;
}

// ---------- canvas / grid ----------
const canvas = document.getElementById('c');
const stage = canvas.parentElement;
const ctx = canvas.getContext('2d');
let COLS, ROWS, cellW, cellH;
let AXIS0 = 0.68; // funnel spine: right of the card on desktop, centered on phones

// ---------- dodge zone: the funnel bends around the rendered name ----------
const overlayMQ = matchMedia('(max-width: 760px) and (orientation: portrait)');
let ZONE = null; // {x0,x1,y0,y1} in funnel coords, or null when panels are separate

function updateZone() {
  const s = stage.getBoundingClientRect();
  const r = document.querySelector('.cardbox').getBoundingClientRect();
  ZONE = {
    x0: (r.left - s.left) / s.width,
    x1: (r.right - s.left) / s.width,
    y0: ((r.top - s.top) / cellH) / (ROWS - 1),
    y1: ((r.bottom - s.top) / cellH) / (ROWS - 1),
  };
}

function resize() {
  const w = stage.clientWidth, h = stage.clientHeight;
  AXIS0 = overlayMQ.matches ? 0.5 : 0.68;
  cellH = Math.max(10, Math.floor(h / 64));
  cellW = Math.round(cellH * 0.62);
  COLS = Math.ceil(w / cellW);
  ROWS = Math.ceil(h / cellH);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.font = cellH + 'px ' + getComputedStyle(document.body).fontFamily;
  ctx.textBaseline = 'top';
}
window.addEventListener('resize', () => { resize(); updateZone(); drawFrame(t); });

// ---------- the tornado: one density function ----------
function density(x, y, t) {
  const sway = (fbm(y * 2.6 + 3.7, t * 0.26) - 0.5) * (0.14 + 0.32 * y);
  let axis = AXIS0 + sway;
  const breathe = 0.9 + 0.25 * (fbm(y * 1.4, t * 0.18 + 9.1) - 0.5);
  let r = (0.035 + 0.30 * Math.pow(1 - y, 1.6)) * breathe;

    const g = sstep(ZONE.y0 - 0.16, ZONE.y0 + 0.02, y) * (1 - sstep(ZONE.y1 - 0.02, ZONE.y1 + 0.16, y));
    if (g > 0) {
      r *= 1 - 0.30 * g;                              // squeeze past the name
      const clear = ZONE.x1 + r + 0.05;               // spine target that clears the text
      axis = lerp(axis, Math.max(axis, clear), g);    // S-bend around it
    }

  const dx = (x - axis) / r;
  if (dx < -1.35 || dx > 1.35) return 0;
  const body = Math.pow(sstep(1.3, 0.15, Math.abs(dx)), 0.8);
  const tex = fbm(dx * 1.7 + t * 1.15 + y * 1.1, y * 6.5 - t * 1.7);
  let d = body * (0.30 + 1.05 * tex);
  d *= 0.86 + 0.28 * SKY_CHARGE; // the funnel breathes with the storm charge — felt, not seen
  if (ZONE && d > 0) {
    // hard feathered exclusion: no glyph ever sits on the type
    const mx = sstep(ZONE.x0 - 0.06, ZONE.x0 - 0.015, x) * (1 - sstep(ZONE.x1 + 0.015, ZONE.x1 + 0.06, x));
    const my = sstep(ZONE.y0 - 0.05, ZONE.y0 - 0.012, y) * (1 - sstep(ZONE.y1 + 0.012, ZONE.y1 + 0.05, y));
    d *= 1 - mx * my;
  }
  return d;
}

// ---------- lightning ----------
const bolts = []; // {cells: [col,row,ch, ...], age, life, restrikes, endCol, endRow}
// 1/f-flavored storm clock: three non-harmonic slow waves + drifting noise.
// Surges and lulls you can half-feel coming, but the pattern never repeats —
// the "predictions mostly right, occasionally wrong" band that reads as
// natural instead of metronomic or random.
function stormIntensity(tt) {

    + 0.24 * Math.sin(TAU * tt / 31)
    + 0.18 * Math.sin(TAU * tt / 50 + 1.7)
    + 0.14 * Math.sin(TAU * tt / 81 + 4.1)
    + 0.35 * (fbm(tt * 0.023, 5.5) - 0.5);

}

const SPARKS = '*+x·';

// real flashes fire several return strokes ~35-50ms apart — the naked-eye

// the cloud glow all pulse together on each one (that shared pulse is the
// satisfying part — one event, felt in three places at once).
function makeStrokes(maxExtra, multiChance) {
  const strokes = [0];
  let a = 0;
  const n = Math.random() < multiChance ? 1 + Math.floor(Math.random() * maxExtra) : 0;
  for (let s = 0; s < n; s++) { a += 2 + Math.floor(Math.random() * 4); strokes.push(a); }

}

    const d = bolt.age - bolt.strokes[s];
    const amp = s === 0 ? 1 : Math.max(0.3, 0.62 - 0.16 * s); // re-strikes are dim ghosts, not equal flashes
    b = Math.max(b, amp * (d >= 0 ? Math.exp(-d * 0.5) : Math.exp(d * 1.3)));

function inZone(x, y, pad) {
  return ZONE && x > ZONE.x0 - pad && x < ZONE.x1 + pad && y > ZONE.y0 - pad && y < ZONE.y1 + pad;
}

// cloud strength AS RENDERED at a cell — the raw field minus the text-zone
// feather, so the bolt spawner never anchors to cloud the viewer can't see
function visibleCloudAt(col, row) {
  const xN = col / COLS, yF = row / (ROWS - 1);
  const D = cloudDecks(xN, row / ROWS, t);
  let v = 0;
  for (let i = 0; i < D.length; i++) if (D[i] > v) v = D[i];
  if (v > 0 && ZONE) {
    const mx = sstep(ZONE.x0 - 0.09, ZONE.x0 - 0.01, xN) * (1 - sstep(ZONE.x1 + 0.01, ZONE.x1 + 0.09, xN));
    const my = sstep(ZONE.y0 - 0.08, ZONE.y0 - 0.01, yF) * (1 - sstep(ZONE.y1 + 0.01, ZONE.y1 + 0.08, yF));
    v *= 1 - mx * my;
  }

}

const RECENT_COLS = []; // last few strike origins — new bolts steer AWAY from them
function spawnBolt(mega, at, remoteHue, charge = 0) {
  const cells = [];
  const forkChance = (mega ? 0.24 : 0.07) + 0.15 * charge;
  let col, startRow;
  if (at) { // caller pinned the origin (e.g. a pressed cloud)
    col = at.col;
    startRow = at.row;
  } else {
    // strike from VISIBLE cloud, always: a column qualifies only if it has a
    // cloud base that actually renders (zone feather applied, wisp tiers too
    // faint to count). The slow sky barely changes between button presses, so
    // random-among-qualifying repeats — instead score candidates by distance
    // from RECENT origins (plus a dash of chaos) and take the best
    const candidates = [];
    for (let i = 0; i < 24; i++) {
      const c = Math.floor(COLS * (0.08 + Math.random() * 0.84));
      for (let rw = Math.floor(ROWS * 0.5); rw >= 0; rw--) {
        if (visibleCloudAt(c, rw) > 0.07) { candidates.push(c, rw); break; }
      }
    }

      let bi = 0, bs = -1;
      for (let j = 0; j < candidates.length; j += 2) {
        let dmin = COLS;
        for (const rc of RECENT_COLS) dmin = Math.min(dmin, Math.abs(candidates[j] - rc));
        const score = dmin + Math.random() * COLS * 0.18;
        if (score > bs) { bs = score; bi = j; }
      }
      col = candidates[bi];
      startRow = Math.max(0, candidates[bi + 1] - 2 - Math.floor(Math.random() * 3)); // varied depth inside the deck
    } else { // genuinely bare sky: strike from the top of the frame
      col = Math.floor(COLS * (0.2 + Math.random() * 0.6));
      startRow = 0;
    }
  }

  if (RECENT_COLS.length > 4) RECENT_COLS.shift();
  let endRow = Math.floor(ROWS * ((mega ? 0.75 : 0.62) + Math.random() * (mega ? 0.23 : 0.34)));
  if (at) // pressed origins can sit low — always leave the bolt room to travel
    endRow = Math.min(ROWS - 2, Math.max(endRow, startRow + 6 + Math.floor(Math.random() * 8)));
  // text box in grid coords: bolts steer around it, never get clipped by it
  const z = ZONE ? {
    x0: (ZONE.x0 - 0.03) * COLS, x1: (ZONE.x1 + 0.03) * COLS,
    y0: ZONE.y0 * (ROWS - 1),    y1: ZONE.y1 * (ROWS - 1) + 2,
  } : null;
  // per-bolt lean: each channel tilts left or right AS A WHOLE, so two strikes
  // from the same cloud still cut different diagonals across the sky
  const lean = (Math.random() - 0.5) * (mega ? 0.30 : 0.22);
  let row = startRow;
  for (; row < endRow; row++) {
    const turn = Math.random();
    let drift = turn < 0.28 - lean ? -1 : turn < 0.56 + lean ? 1 : 0;
    if (Math.random() < 0.10) drift *= 2; // hard jag
    if (mega && Math.random() < 0.28) drift *= 2; // mega wanders wider across the sky
    if (z && row >= z.y0 - 5 && row <= z.y1) {
      const nx = col + drift;
      if (nx >= z.x0 && nx <= z.x1) drift = (col - z.x0 < z.x1 - col) ? -2 : 2; // veer around the name
    }
    col += drift;
    if (col < 1 || col > COLS - 2) break;
    cells.push(col, row, drift === 0 ? '|' : drift > 0 ? '\\' : '/');
    if (Math.random() < forkChance && row > 3) { // fork
      let bcol = col;
      const bdir = Math.random() < 0.5 ? -1 : 1;
      const blen = (mega ? 4 : 2) + Math.floor(Math.random() * (mega ? 9 : 5));
      for (let i = 1; i <= blen; i++) {
        bcol += bdir;
        if (mega && Math.random() < 0.35) bcol += bdir; // extra horizontal reach on the big one
        if (bcol < 1 || bcol > COLS - 2) break;
        if (z && row + i >= z.y0 && row + i <= z.y1 && bcol >= z.x0 && bcol <= z.x1) break;
        cells.push(bcol, row + i, bdir > 0 ? '\\' : '/');
      }

  const strokes = makeStrokes(1, mega ? 0.5 : 0.4);

  // (the occlusion winner — the cloud you actually see there)
  let bdeck = VORTEX_Z;

    const oc = cells.length ? cells[0] : col, or = cells.length ? cells[1] : startRow;
    const D0 = cloudDecks(oc / COLS, or / ROWS, t);
    for (let i = D0.length - 1; i >= 0; i--) if (D0[i] > 0.012) { bdeck = i; break; }
  }
  const bolt = {
    deck: bdeck,
    cells, strokes, age: 0,
    life: strokes[strokes.length - 1] + (mega ? 13 : 9) + Math.round(6 * charge) + Math.floor(Math.random() * 5),
    endCol: col, endRow: row,
    boost: (mega ? 1.6 : 1) * (1 + 1.1 * charge), // remote strikes replicate the sender's exact strength
    lx: cells.length ? cells[0] : col,
    ly: cells.length ? cells[1] : startRow,
    rscale: (mega ? 1.8 : 1) * (1 + 0.9 * charge),
    mega: !!mega,
    // hue: which color the channel discharges in. YOUR strikes = your accent,
    // a remote visitor's strike = THEIR accent, ambient storm = white (null).
    hue: remoteHue != null ? remoteHue : mega || at ? HUE : null,
  };
  bolts.push(bolt);
  shake = Math.max(shake, Math.round((mega ? 9 : 5) + 5 * charge));
  return bolt;
}

// sheet lightning: no channel — a broad flash inside the deck itself
function spawnSheet() {
  const spots = [];
  for (let i = 0; i < 12; i++) {
    const cc = Math.floor(COLS * (0.08 + Math.random() * 0.84));
    for (let rw = Math.floor(ROWS * 0.4); rw >= 0; rw--) {
      if (visibleCloudAt(cc, rw) > 0.07) { spots.push(cc, Math.max(0, rw - 2)); break; }
    }
  }
  if (!spots.length) return spawnBolt(); // bare sky: fall back to a channel
  const k = 2 * Math.floor(Math.random() * (spots.length / 2));
  const strokes = makeStrokes(1, 0.4);
  // the flash lives DEEP inside the stack: of all decks holding cloud at this
  // spot, bias the pick hard toward the deepest — the layers in front cloak
  // into silhouette and the glow reads as lightning buried within the cloud
  let bdeck = VORTEX_Z;
  {
    const D0 = cloudDecks(spots[k] / COLS, spots[k + 1] / ROWS, t);
    const cand = [];
    for (let i = 0; i < D0.length; i++) if (D0[i] > 0.012) cand.push(i);
    if (cand.length) bdeck = cand[Math.floor(Math.pow(Math.random(), 2.2) * cand.length)];
  }
  bolts.push({
    deck: bdeck,
    cells: [], strokes, age: 0, life: strokes[strokes.length - 1] + 13 + Math.floor(Math.random() * 6),
    endCol: 0, endRow: 0, boost: 1.25,
    lx: spots[k], ly: spots[k + 1], rscale: 2.3,
  });

}

    const nowP = Date.now();
    for (const sid in PEERS) {

      if (nowP - pr.ts > 4000) { delete PEERS[sid]; continue; }

      pr.cy += (pr.y - pr.cy) * 0.3;

    }
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let lvl = 0; lvl < CBASE; lvl++) { // base cloud tiers (unlit)
    const cells = clouds[lvl];
    if (!cells.length) continue;
    ctx.fillStyle = CLOUD_C[lvl];
    const ch = CLOUD_CH[lvl];
    for (let i = 0; i < cells.length; i += 2) ctx.fillText(ch, cells[i] * cellW, cells[i + 1] * cellH);
  }
  for (let lv = 0; lv < LITN; lv++) { // lightning-lit clouds, brightened from their own shade
    const cells = clouds[CBASE + lv];
    if (cells.length) {
      ctx.fillStyle = LIT_C[lv];
      const ch = LIT_CH[lv];
      for (let i = 0; i < cells.length; i += 2) ctx.fillText(ch, cells[i] * cellW, cells[i + 1] * cellH);
    }
  }
  for (const key in hued) { // cells lit by SOMEONE's color — yours or any visitor's
    const cells = hued[key];
    if (!cells.length) continue;
    const k = +key, lv = k % LITN, bin = (k - lv) / LITN;
    ctx.fillStyle = acH(bin * 15, LIT_LUM[lv], 42);
    const ch = LIT_CH[lv];
    for (let i = 0; i < cells.length; i += 2) ctx.fillText(ch, cells[i] * cellW, cells[i + 1] * cellH);
  }
  ctx.fillStyle = DUST;
  for (let i = 0; i < dust.length; i += 2) ctx.fillText('·', dust[i] * cellW, dust[i + 1] * cellH);
  for (let b = 1; b < N; b++) {
    const cells = buckets[b];
    if (!cells.length) continue;
    ctx.fillStyle = COLORS[b];
    const ch = RAMP[b];
    for (let i = 0; i < cells.length; i += 2) ctx.fillText(ch, cells[i] * cellW, cells[i + 1] * cellH);
  }
  // lightning on top: each return stroke re-flashes the channel, sky and clouds
  // together — the shared multi-stroke pulse
  let flash = 0, flashT = null; // hue of the dominant bolt, null = white
  for (const bolt of bolts) {
    if (bolt.age >= bolt.life) continue;
    const br = bolt.bright; // computed in the lights pass above
    let vSum = 0, vCnt = 0; // how much foreground cloud covers this bolt's channel
    // intertwined with the sky: the bolt lives at the vortex's z-plane, so the
    // two FOREGROUND scud decks veil the channel where they cross in front —
    // the bolt reads as glimpses woven through the cloud, not a line on top.
    // (It still draws over the six background decks: true depth interleaving.)
    const vCore = 60 + 195 * br;
    for (let j = 0; j < bolt.cells.length; j += 3) {
      const c = bolt.cells[j], r = bolt.cells[j + 1], ch = bolt.cells[j + 2];
      let veil = 1;
      if (r / ROWS < 0.66) {
        const D = cloudDecks(c / COLS, r / ROWS, t);
        // only decks strictly in front of THIS bolt's plane veil its channel —
        // and z-distance matters: a deck hugging the bolt's plane covers hard,
        // a deck far in front of it covers softer
        let fg = 0;
        const bp = bolt.deck ?? VORTEX_Z;
        for (let i = FRONT_START; i < NDECKS; i++) {
          if (i <= bp || D[i] <= 0) continue;
          const w = D[i] / (1 + 0.5 * Math.max(0, (i - bp) * ZS - ZS));
          if (w > fg) fg = w;
        }
        veil = fg <= 0.012 ? 1 : Math.max(0, 1 - (fg - 0.012) * 9);
        vSum += veil; vCnt++;
        if (veil < 0.1) continue; // buried inside dense foreground cloud
      } else { vSum++; vCnt++; }
      if (br > 0.3) { // dim halo widens the channel while a stroke is hot
        ctx.fillStyle = bolt.hue != null ? acH(bolt.hue, Math.round(72 * veil), 55) : g(Math.round(72 * veil));
        ctx.fillText(ch, (c - 1) * cellW, r * cellH);
        ctx.fillText(ch, (c + 1) * cellW, r * cellH);
        if (bolt.mega) { // the big one gets a second, fainter halo ring
          ctx.fillStyle = bolt.hue != null ? acH(bolt.hue, Math.round(40 * veil), 55) : g(Math.round(40 * veil));
          ctx.fillText(ch, (c - 2) * cellW, r * cellH);
          ctx.fillText(ch, (c + 2) * cellW, r * cellH);
        }
      }
      // core: white; your strikes get only a WHISPER of the accent
      ctx.fillStyle = bolt.hue != null ? acH(bolt.hue, Math.round(vCore * veil), 22) : g(Math.round(vCore * veil));
      ctx.fillText(ch, c * cellW, r * cellH);
      if (bolt.mega && br > 0.4) // mega: double-width white core
        ctx.fillText(ch, c * cellW + cellW * 0.55, r * cellH);
    }
    // the screen-wide sky flash is covered by whatever cloud sits in front of
    // the bolt: mostly-buried channel → dimmer overlay flash (never fully dark)
    const cover = vCnt ? vSum / vCnt : 1;
    const fc = Math.min(1.5, bolt.boost * br) * (0.4 + 0.6 * cover);
    if (fc > flash) { flash = fc; flashT = bolt.hue; } // the dominant bolt's hue colors the flash (null = white)
    if (bolt.age < 6 && bolt.cells.length) { // sparks kicked up at the strike point
      ctx.fillStyle = bolt.hue != null ? acH(bolt.hue, 230, 45) : g(230);
      for (let s = 0; s < 5; s++) {
        const sc = bolt.endCol + Math.round((Math.random() - 0.5) * 7);
        const sr = bolt.endRow - Math.floor(Math.random() * 3);
        if (inZone(sc / COLS, sr / (ROWS - 1), 0)) continue;
        ctx.fillText(SPARKS[Math.floor(Math.random() * 4)], sc * cellW, sr * cellH);
      }
    }
  }
  // dark mode: white sky-flash. light mode: the paper darkens as the bolt discharges.
  // the cursor tip itself: tiny crackle glyphs jittering at the point (the
  // static-electric buzz), plus fading embers along the recent path
  if (!INVERT && MX >= 0) {
    // charging: sparks start scattered wide and collapse inward with the spot;
    // and they hug tighter when the hovered cloud is far away (perspective)
    const hdsc = HOVER_DECK >= 0 ? DEPTH_SCALE[HOVER_DECK] : 1;
    const nCr = 3 + Math.round(6 * CHG), rCr = (HOLD_T0 ? 0.7 + 2.0 * (1 - CHG) : 0.8) * hdsc;
    for (let s = 0; s < nCr; s++) {
      ctx.fillStyle = ac(120 + Math.floor(Math.random() * 135), 55);
      ctx.fillText('·+*x'[Math.floor(Math.random() * 4)],
        (MX + (Math.random() - 0.5) * rCr) * cellW,
        (MY + (Math.random() - 0.5) * rCr) * cellH);
    }
    for (let s = 3; s < Math.min(TRAIL.length, 15); s += 3) {
      if (Math.random() < 0.5) continue;
      ctx.fillStyle = ac(Math.round(140 * Math.pow(0.7, s / 3)), 55);
      ctx.fillText('·', TRAIL[s] * cellW, TRAIL[s + 1] * cellH);
    }
  }
  // peers' crackle tips — each remote cursor sparks in its own hue, harder
  // while its owner is charging (power > 1)
  if (!INVERT) {
    for (let s = 0; s < PEER_ARR.length; s += 7) {
      const n = 2 + Math.round(4 * (PEER_ARR[s + 4] - 1) / 1.8), rC = 0.9 * PEER_ARR[s + 6];
      for (let q = 0; q < n; q++) {
        ctx.fillStyle = acH(PEER_ARR[s + 2], 110 + Math.floor(Math.random() * 120), 55);
        ctx.fillText('·+*x'[Math.floor(Math.random() * 4)],
          (PEER_ARR[s] + (Math.random() - 0.5) * rC) * cellW,
          (PEER_ARR[s + 1] + (Math.random() - 0.5) * rC) * cellH);
      }
    }
  }
  if (flash > 0.02) // ambient flash: white. Your strike's flash: a pale wash of your accent
    flashEl.style.background = INVERT ? '#0a0a0a' : flashT != null ? `hsl(${flashT} 55% 88%)` : '#ffffff';
  flashEl.style.opacity = flash > 0.02 ? ((INVERT ? 0.16 : 0.22) * flash).toFixed(3) : 0;
}

// ---------- 30 fps loop ----------
const FRAME = 1000 / 30;
let last = 0;
const still = matchMedia('(prefers-reduced-motion: reduce)').matches;
function loop(now) {
  requestAnimationFrame(loop);
  if (now - last < FRAME) return;
  // fps: smoothed from the real inter-frame gap (before the frozen-motion bail)
  if (last) { const inst = 1000 / Math.max(1, now - last); FPS = FPS ? FPS * 0.9 + inst * 0.1 : inst; }
  // refresh the HUD stats ~4x/sec (roster redraws on its own presence events)
  if (now - HUD_LAST > 250) { HUD_LAST = now; renderHud(false); }
  // reduced motion: the storm stays frozen, but a requested strike still plays out
  if (still && !bolts.length && !shake) return;
  last = now;
  if (!still) {
    t += (1 / 30) * 0.30; // world clock at 30% — everything (vortex, clouds, dust) slowed 70%
    if (!INVERT) { // no lightning in light mode — paper stays calm
      // strike timing: a 1/f storm clock sets the mood (surges & long lulls you
      // half-anticipate), Hawkes self-excitation clusters strikes (one begets the
      // next), a refractory gap prevents machine-gunning. Never repeats, never
      // metronomic — the band that reads as real rather than uncanny.
      const storm = stormIntensity(t);
      excite *= 0.93; // self-excitation decays (~0.3s half-life)
      if (refractory > 0) {
        refractory--;
      } else if (Math.random() < storm * (0.35 + excite) * 0.055) {
        // sheet flashes murmur constantly — through lulls AND between the
        // channel strikes of a surge; channels still punch through surges
        const sheet = Math.random() < (storm < 0.5 ? 0.8 : 0.4);
        sheet ? spawnSheet() : spawnBolt();
        excite += sheet ? 0.35 : 0.55;               // this strike primes the next
        refractory = sheet ? 3 + Math.floor(Math.random() * 5)
                           : 6 + Math.floor(Math.random() * 8);
      }
    }
  }
  for (let i = bolts.length - 1; i >= 0; i--) {
    if (++bolts[i].age >= bolts[i].life) bolts.splice(i, 1);
  }
  // sample the cursor path for the electric trail (with a static-y jitter)
  if (!INVERT && MX >= 0) {
    TRAIL.unshift(MX + (Math.random() - 0.5) * 0.35, MY + (Math.random() - 0.5) * 0.35, HOVER_DECK);
    if (TRAIL.length > 24) TRAIL.length = 24;
  } else if (TRAIL.length) TRAIL.length = 0;
  // broadcast MY charged cursor to the shared storm (throttled; armed only)
  const nms = performance.now();
  if (WS_ALIVE && !INVERT && MX >= 0 && (HOVER_DECK >= 0 || HOLD_T0)) {
    const cx = clamp(MX / COLS, 0, 1), cy = clamp(MY / ROWS, 0, 1);
    if (nms - CUR_LAST > 120 &&
        (Math.abs(cx - CUR_X) > 0.004 || Math.abs(cy - CUR_Y) > 0.006 ||
         Math.abs(CHG - CUR_CHG) > 0.03 || nms - CUR_LAST > 600)) {
      CUR_LAST = nms; CUR_X = cx; CUR_Y = cy; CUR_CHG = CHG; CUR_ON = true;
      wsPush('cursor', { x: cx, y: cy, hue: HUE, chg: Math.round(CHG * 100) / 100 });
    }
  } else if (CUR_ON) {
    CUR_ON = false;
    wsPush('cursor', { x: -1, y: 0, hue: HUE, chg: 0 });
  }
  tickEver();
  // the meter reloads after 2s of chill — fast, with a sparking head
  if (!INVERT && ENERGY < 1 && performance.now() - LAST_SPEND > 2000) {
    ENERGY = Math.min(1, ENERGY + 1 / 40);
  }
  drawMeter();
  if (BTN_T0) { // the held button fills with your accent as the charge builds
    const P = (CHG * 100).toFixed(1);
    strikeEl.style.background = `linear-gradient(90deg, hsl(${HUE} 60% 42% / 0.9) ${P}%, transparent ${P}%)`;
    strikeEl.style.color = 'var(--ink)';
  }
  if (shake > 0) { // a jolt through the storm on strike
    shake--;
    canvas.style.transform = shake
      ? `translate(${((Math.random() - 0.5) * 5).toFixed(1)}px, ${((Math.random() - 0.5) * 4).toFixed(1)}px)`
      : '';
  }
  drawFrame(t);
}

// the button: one mega-bolt per press, spam-friendly (dark mode only)
const strikeEl = document.getElementById('strike');
// the button charges too: hold it and it FILLS with your accent — release to
// discharge (same charge/energy/volley physics as holding on a cloud)
let BTN_T0 = 0;
strikeEl.addEventListener('pointerdown', e => {
  if (INVERT || e.button > 0) return;
  BTN_T0 = performance.now();
  HOLD_T0 = BTN_T0; // the spotlight/meter charge state rides along
  strikeEl.classList.add('charging');
  try { strikeEl.setPointerCapture(e.pointerId); } catch (err) {}
  e.preventDefault();
});
strikeEl.addEventListener('pointerup', () => {
  if (!BTN_T0) return;
  const held = (performance.now() - BTN_T0) / 1000;
  BTN_T0 = 0; HOLD_T0 = 0;
  strikeEl.classList.remove('charging');
  strikeEl.style.background = ''; strikeEl.style.color = '';
  if (INVERT) return;
  discharge(undefined, held);
});
strikeEl.addEventListener('pointercancel', () => { BTN_T0 = 0; HOLD_T0 = 0; strikeEl.classList.remove('charging'); strikeEl.style.background = ''; strikeEl.style.color = ''; });

// SPACEBAR charges lightning from anywhere — hold to build, release to strike
// (a random cloud, like the button). preventDefault on down AND up cancels the
// focused button's native space-activation so it never double-fires.
let SPACE_DOWN = false;
// ---------- the landing gate ----------
// A white screen; press SPACE (or the button) to enter the dark storm behind it.
let INTRO = true;
const introEl = document.getElementById('intro');
const enterEl = document.getElementById('enter');
function enterStorm() {
  if (!INTRO) return;
  INTRO = false;
  document.documentElement.setAttribute('data-theme', 'dark'); // into the storm (observer → readTheme)
  introEl.classList.add('gone');
  setTimeout(() => { introEl.style.display = 'none'; }, 800);
}
enterEl.addEventListener('click', enterStorm);

addEventListener('keydown', e => {
  if (e.code !== 'Space' && e.key !== ' ') return;
  e.preventDefault();
  if (INTRO) { if (!e.repeat) enterEl.classList.add('charging'); return; } // gate: space presses ENTER
  if (e.repeat || INVERT || SPACE_DOWN || HOLD_T0 || BTN_T0) return;
  SPACE_DOWN = true;
  BTN_T0 = HOLD_T0 = performance.now(); // fills the button + charges the meter/spotlight
  strikeEl.classList.add('charging');
});
addEventListener('keyup', e => {
  if (e.code !== 'Space' && e.key !== ' ') return;
  if (INTRO) { e.preventDefault(); enterEl.classList.remove('charging'); enterStorm(); return; }
  if (!SPACE_DOWN) return;
  e.preventDefault();
  SPACE_DOWN = false;
  const held = (performance.now() - BTN_T0) / 1000;
  BTN_T0 = HOLD_T0 = 0;
  strikeEl.classList.remove('charging');
  strikeEl.style.background = ''; strikeEl.style.color = '';
  if (!INVERT) discharge(undefined, held);
});
// keyboard activation (Enter/Space) arrives as a detail-0 click — classic tap
strikeEl.addEventListener('click', e => {
  if (INVERT || e.detail !== 0) return;
  discharge(undefined, 0.05);
});

// lightning REQUIRES a hovered cloud — and now it CHARGES: press and hold on
// a cloud and the spotlight swells, condenses and crackles as charge builds
// (exponential, ~full at 3s); release to discharge. A quick tap is a small
// bolt, a full hold is a monster.
function cellAt(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    col: clamp(Math.round((e.clientX - rect.left) / cellW), 1, COLS - 2),
    row: Math.max(0, Math.round((e.clientY - rect.top) / cellH)),
  };
}
canvas.addEventListener('mousedown', e => {
  if (INVERT || e.button !== 0) return;
  const { col, row } = cellAt(e);
  if (visibleCloudAt(col, row) <= 0.012) return; // bare sky: nothing to charge
  HOLD_T0 = performance.now();
});
canvas.addEventListener('mouseup', e => {
  if (!HOLD_T0) return;
  const held = (performance.now() - HOLD_T0) / 1000;
  HOLD_T0 = 0;
  if (INVERT) return;
  const { col, row } = cellAt(e); // discharge from wherever the cursor is NOW
  if (visibleCloudAt(col, row) <= 0.012) return;
  // same energy-gated path as the button: the meter feeds EVERY strike
  discharge({ col, row: Math.max(0, row - 1) }, held);
});

// cursor tracking for the hover highlight; over an armed cloud the OS cursor
// vanishes entirely — the electric spotlight + crackle IS the cursor there
let MX = -1, MY = -1, HOVER_DECK = -1;
let HOLD_T0 = 0, CHG = 0, SPOT_MUL = 1, SPOT_POW = 1; // hold-to-charge state
let CUR_LAST = 0, CUR_X = -2, CUR_Y = -2, CUR_CHG = 0, CUR_ON = false; // my presence throttle

// ---------- the lightning meter: strike stamina ----------
// Strikes DRAIN it (bigger charge = bigger cost); after 2s of chill it
// reloads fast. Empty = fizzle. Purely local pacing — the server keeps its
// own rate rails.
let ENERGY = 1, LAST_SPEND = -1e9, METER_DENY = 0;
const meterEl = document.getElementById('meter');
const mfillEl = document.getElementById('mfill');
const mriskEl = document.getElementById('mrisk');
const mheadEl = document.getElementById('mhead');
const memptyEl = document.getElementById('mempty');

function spendEnergy(cost) {
  if (ENERGY < 0.15) { METER_DENY = 10; return 0; } // tapped out: red flicker, no bolt
  const spent = Math.min(cost, ENERGY);
  ENERGY -= spent;
  LAST_SPEND = performance.now();
  return spent / cost; // 1 = full-power, <1 = the bar could only partly feed it
}

const METER_N = 18, SPARK6 = '·+*x$&';
function drawMeter() {
  if (INVERT) { meterEl.hidden = true; return; }
  meterEl.hidden = false;
  // while holding, the segment the strike WOULD cost flickers — you can see
  // exactly what you are about to spend
  const cost = HOLD_T0 ? Math.min(ENERGY, 0.34 + 0.5 * CHG) : 0;
  const keep = Math.max(0, Math.floor((ENERGY - cost) * METER_N + 1e-6));
  const risk = Math.floor(ENERGY * METER_N + 1e-6) - keep;
  const charging = ENERGY < 1 - 1e-6;
  const headCh = charging && !HOLD_T0 ? SPARK6[Math.floor(Math.random() * 6)] : '';
  mfillEl.textContent = '&'.repeat(keep);
  mriskEl.textContent = '&'.repeat(risk);
  mheadEl.textContent = headCh;
  memptyEl.textContent = '·'.repeat(Math.max(0, METER_N - keep - risk - (headCh ? 1 : 0)));
  const full = !charging;
  mfillEl.style.color = `hsl(${HUE} ${full ? 72 : 55}% ${full ? 66 : 56}%)`;
  mfillEl.style.textShadow = full
    ? `0 0 ${9 + 3 * Math.sin(performance.now() / 300)}px hsl(${HUE} 80% 60% / 0.5)` // full: it BREATHES
    : 'none';
  mriskEl.style.color = Math.random() < 0.5 ? `hsl(${HUE} 85% 75%)` : `hsl(${HUE} 40% 40%)`;
  mheadEl.style.color = `hsl(${HUE} 85% 74%)`;
  memptyEl.style.color = METER_DENY > 0 && (METER_DENY-- , Math.random() < 0.7) ? 'hsl(4 75% 55%)' : '';
}

// ONE discharge path for canvas release, button release and volley extras —
// energy-gated, charge-scaled, broadcast to the shared storm
function discharge(at, held) {
  const charge = 1 - Math.exp(-held);
  const eff = spendEnergy(0.34 + 0.5 * charge);
  if (!eff) return;
  const c = charge * eff; // a half-fed bar throws a half-power bolt
  const monster = c > 0.85 || (!at && held < 0.15); // a quick button tap keeps the classic mega
  const b = spawnBolt(monster, at, undefined, c);
  if (b) reportStrike(b.lx / COLS, b.ly / ROWS, monster, c);
  const extras = Math.min(3, Math.max(1, Math.floor(held))) - 1;
  for (let i = 0; i < extras; i++) {
    const delay = Math.random() < 0.25 ? 0 : 150 + Math.random() * 850;
    setTimeout(() => {
      if (INVERT || !spendEnergy(0.12)) return; // each extra sips the bar too
      const eb = spawnBolt(monster, undefined, undefined, c);
      if (eb) reportStrike(eb.lx / COLS, eb.ly / ROWS, monster, c);
    }, delay);
  }
}
let TRAIL = [], BUZZ = 1; // recent cursor samples [x, y, deck, ...] for the blur trail
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  MX = (e.clientX - rect.left) / cellW;
  MY = (e.clientY - rect.top) / cellH;
  canvas.style.cursor = (!INVERT && visibleCloudAt(Math.round(MX), Math.round(MY)) > 0.012)
    ? 'none' : 'default';
});
canvas.addEventListener('mouseleave', () => { MX = MY = -1; HOVER_DECK = -1; HOLD_T0 = 0; });

// typewriter: the role line slowly loses its composure, then repeats.
// updateZone() after every character so the storm keeps dodging the text.
const ROLES = [
  'Creative Developer',
  'Crazy Artist',
  'AI Workflow Specialist',
  'Bad open source developer',
  'Good friend',
  'Loyal dog',
  'Are you still reading?',
  'Hello',
  'Anyone there?',
  'Hello darkness my old friend',
  'HELLO???',
];
const roleEl = document.getElementById('rolewords');
let roleI = 0, roleChars = ROLES[0].length, roleDel = false;
function roleTick() {
  const word = ROLES[roleI];
  if (!roleDel) {
    if (roleChars < word.length) {
      roleEl.textContent = word.slice(0, ++roleChars);
      updateZone();
      setTimeout(roleTick, 45 + Math.random() * 75);          // human-ish typing
    } else {
      roleDel = true;
      setTimeout(roleTick, 1400 + 50 * word.length);          // let it be read
    }
  } else {
    if (roleChars > 0) {
      roleEl.textContent = word.slice(0, --roleChars);
      updateZone();
      setTimeout(roleTick, 20 + Math.random() * 28);          // deleting is quicker
    } else {
      roleDel = false;
      roleI = (roleI + 1) % ROLES.length;
      setTimeout(roleTick, 420);                              // beat before the next thought
    }
  }
}
if (!still) setTimeout(roleTick, 2600); // reduced motion: stays "Creative Developer"

// follow the viewer's theme: the in-page toggle and the artifact toggle both
// stamp data-theme on <html>, and the OS preference drives the media query —
// read whichever wins.
const themeBtn = document.getElementById('theme');
function readTheme() {
  // belt and braces: if the computed custom property can't be read (some
  // engines return '' for it), fall back to data-theme, then the OS query —
  // light mode must NEVER accidentally read as dark (buzz/storm would leak in)
  const dt = document.documentElement.getAttribute('data-theme');
  const v = getComputedStyle(document.documentElement).getPropertyValue('--is-dark').trim();
  INVERT = dt ? dt === 'light'
         : v  ? v === '0'
         : matchMedia('(prefers-color-scheme: light)').matches;
  flashEl.style.background = INVERT ? '#0a0a0a' : '#ffffff';
  themeBtn.textContent = INVERT ? 'dark' : 'light'; // label = the mode you'd switch TO
  strikeEl.style.display = INVERT ? 'none' : '';     // no lightning → no button in light mode
  everEl.hidden = INVERT || !EVER_SEEN;              // counter rides with the storm
  canvas.style.cursor = 'default'; // crosshair appears only over an armed (hovered) cloud
  if (INVERT) { bolts.length = 0; flashEl.style.opacity = 0; } // clear any in-flight storm
  rebuildPalette();
  drawFrame(t);
}
themeBtn.addEventListener('click', () => {
  const next = INVERT ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('fj-theme', next); } catch (e) {}
});
try { const saved = localStorage.getItem('fj-theme'); if (saved) document.documentElement.setAttribute('data-theme', saved); } catch (e) {}
new MutationObserver(readTheme).observe(document.documentElement,
  { attributes: true, attributeFilter: ['data-theme', 'style', 'class'] });
matchMedia('(prefers-color-scheme: light)').addEventListener('change', readTheme);

// ---------- shared storm (Barkpark pulse channel) ----------
// Every visitor's strikes flow through one Barkpark 'pulse' channel: yours are
// POSTed (fire-and-forget), everyone's stream back on a slow poll and render
// in THEIR accent hue, and the counter is the number of strikes EVER, by
// anyone. If Barkpark is unreachable the storm is simply local — silence,
// backoff, zero console noise.
const PULSE = 'https://guerrilla.barkpark.cloud/v1/plugins/pulse/jarl-card';
const everEl = document.getElementById('ever');
const evernEl = document.getElementById('evern');
const MINE = new Set(); // event ids we posted — never re-render our own
let SEEN = 0, POLL_MS = 3000, EVER_SEEN = false, FIRST_POLL = true;
let EVER_TARGET = -1, EVER_SHOWN = -1, EVER_GLOW = 0; // the score is an ODOMETER, not a snapshot

function setEver(total) {
  if (typeof total !== 'number') return;
  EVER_TARGET = Math.max(EVER_TARGET, Math.round(total)); // authoritative totals only move it up
  if (EVER_SHOWN < 0) EVER_SHOWN = Math.max(0, EVER_TARGET - 12); // roll in on first sight
  EVER_SEEN = true;
  everEl.hidden = INVERT;
}

// per-frame odometer: small gaps tick +1 (each tick glows), big catch-ups
// close exponentially — the score is always MOVING toward truth, never snapping
function tickEver() {
  if (EVER_SHOWN >= 0 && EVER_SHOWN < EVER_TARGET) {
    EVER_SHOWN = Math.min(EVER_TARGET, EVER_SHOWN + Math.max(1, Math.ceil((EVER_TARGET - EVER_SHOWN) * 0.2)));
    evernEl.textContent = EVER_SHOWN.toLocaleString('en-US');
    evernEl.style.color = 'var(--ink)';
    EVER_GLOW = 10;
  } else if (EVER_GLOW > 0 && --EVER_GLOW === 0) {
    evernEl.style.color = '';
  }
}

function reportStrike(x, y, mega, chg) {
  // optimistic: YOUR strike moves the score the instant it fires; the server
  // ack confirms (max wins), a definite failure rolls the tick back
  if (EVER_TARGET >= 0) EVER_TARGET++;
  if (typeof fetch !== 'function') return;
  try {
    fetch(PULSE + '/events', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        hue: HUE, x: clamp(x, 0, 1), y: clamp(y, 0, 1), mega: !!mega,
        chg: Math.round(clamp(chg || 0, 0, 1) * 1000) / 1000, // full strength travels with the strike
      }),
    }).then(r => (r.ok ? r.json() : null)).then(d => {
      if (d && d.ok) { MINE.add(d.id); setEver(d.total); }
      else if (EVER_TARGET > 0) EVER_TARGET = Math.max(EVER_SHOWN, EVER_TARGET - 1);
    }).catch(() => { if (EVER_TARGET > 0) EVER_TARGET = Math.max(EVER_SHOWN, EVER_TARGET - 1); });
  } catch (e) { /* storm stays local */ }
}

// one renderer for a remote strike, whatever transport delivered it — an
// EXACT replica: their position, their hue, their mega, their charge
function renderRemote(ev) {
  if (!ev || (ev.id && ev.id <= SEEN)) return;
  if (ev.id) SEEN = Math.max(SEEN, ev.id); // advance PAST our own too, or the poll refetches them forever
  if (typeof ev.total === 'number') setEver(ev.total);
  if (MINE.has(ev.id)) return; // ours: counted, never echoed back
  const P = ev.payload;
  if (!P || INVERT || bolts.length > 7) return;
  spawnBolt(!!P.mega, {
    col: clamp(Math.round(P.x * COLS), 1, COLS - 2),
    row: clamp(Math.round(P.y * ROWS), 0, ROWS - 2),
  }, clamp(Math.round(P.hue ?? 0), 0, 359), clamp(P.chg ?? 0, 0, 1));
}

// ---------- realtime: WebSocket first (Phoenix channel wire), poll as net ----
let WS_ALIVE = false, wsRef = 0, wsHb = 0, WS = null;
const PEERS = {};    // sid → live remote cursor {x,y,hue,chg,ts,cx,cy}
const ROSTER = {};   // sid → hue: EVERYONE present (idle included), from Presence
let MY_SID = null, PING = -1, FPS = 0, HUD_LAST = 0;
const PING_SENT = {}; // ref → send time, for RTT
const hudEl = document.getElementById('hud');
const hpingEl = document.getElementById('hping');
const hfpsEl = document.getElementById('hfps');
const hdotsEl = document.getElementById('hdots');
const hcountEl = document.getElementById('hcount');

// pull the hue out of a Presence meta list (first meta wins)
function rosterFromMetas(entry) {
  const m = entry && entry.metas && entry.metas[0];
  return m && typeof m.hue === 'number' ? m.hue : 0;
}
function applyPresenceState(state) {
  for (const k in ROSTER) delete ROSTER[k];
  for (const sid in state) ROSTER[sid] = rosterFromMetas(state[sid]);
  renderHud(true);
}
function applyPresenceDiff(diff) {
  if (diff.joins) for (const sid in diff.joins) ROSTER[sid] = rosterFromMetas(diff.joins[sid]);
  if (diff.leaves) for (const sid in diff.leaves) delete ROSTER[sid];
  renderHud(true);
}

function renderHud(roster) {
  if (INVERT) { hudEl.hidden = true; return; }
  hudEl.hidden = false;
  hpingEl.textContent = PING >= 0 ? PING + 'ms' : '—';
  hfpsEl.textContent = (FPS ? Math.round(FPS) : '—') + 'fps';
  if (roster) {
    const sids = Object.keys(ROSTER);
    // you first, then the rest — a dot per person in their own colour
    sids.sort((a, b) => (a === MY_SID ? -1 : b === MY_SID ? 1 : 0));
    const shown = sids.slice(0, 14);
    hdotsEl.innerHTML = shown.map(sid =>
      `<i class="${sid === MY_SID ? 'me' : ''}" style="color:hsl(${ROSTER[sid]} 75% 60%)"></i>`).join('');
    const extra = sids.length - shown.length;
    hcountEl.textContent = sids.length + (sids.length === 1 ? ' here' : ' here') + (extra > 0 ? ` (+${extra})` : '');
  }
}
const PEER_ARR = []; // per-frame flat [col,row,hue,sizeMul,power,...] for the cloud pass
function wsPush(event, payload) {
  if (!WS_ALIVE || !WS) return;
  try { WS.send(JSON.stringify(['1', String(++wsRef), 'pulse:jarl-card', event, payload])); } catch (e) {}
}
function wsConnect() {
  if (typeof WebSocket !== 'function') return;
  let ws;
  try {
    ws = new WebSocket(PULSE.replace(/^http/, 'ws').replace(/\/pulse\/jarl-card$/, '/pulse/socket/websocket?vsn=2.0.0'));
  } catch (e) { return; }
  WS = ws;
  ws.onopen = () => {
    WS_ALIVE = true;
    const jref = String(++wsRef);
    PING_SENT[jref] = performance.now();
    ws.send(JSON.stringify(['1', jref, 'pulse:jarl-card', 'phx_join', { hue: HUE }]));
    clearInterval(wsHb);
    const beat = () => {
      const ref = String(++wsRef);
      PING_SENT[ref] = performance.now();
      try { ws.send(JSON.stringify([null, ref, 'phoenix', 'heartbeat', {}])); } catch (e) {}
    };
    beat();
    wsHb = setInterval(beat, 4000); // heartbeat doubles as the ping probe
  };
  ws.onmessage = m => {
    let f; try { f = JSON.parse(m.data); } catch (e) { return; }
    const ref = f[1], topic = f[2], evName = f[3], pl = f[4];
    // ping: any reply whose ref we timed (heartbeats + the join) measures RTT
    if (evName === 'phx_reply' && ref != null && PING_SENT[ref] != null) {
      PING = Math.max(0, Math.round(performance.now() - PING_SENT[ref]));
      delete PING_SENT[ref];
    }
    if (topic !== 'pulse:jarl-card') return;
    if (evName === 'phx_reply' && pl && pl.status === 'ok' && pl.response) {
      if (typeof pl.response.total === 'number') setEver(pl.response.total);
      if (pl.response.sid) MY_SID = pl.response.sid; // now I can mark myself in the roster
    }
    if (evName === 'presence_state') applyPresenceState(pl || {});
    if (evName === 'presence_diff') applyPresenceDiff(pl || {});
    if (evName === 'strike') renderRemote(pl);
    if (evName === 'cursor' && pl && pl.sid) { // a peer's charged presence
      if (pl.x < 0) delete PEERS[pl.sid];
      else PEERS[pl.sid] = Object.assign(PEERS[pl.sid] || { cx: pl.x, cy: pl.y },
        { x: pl.x, y: pl.y, hue: pl.hue || 0, chg: pl.chg || 0, ts: Date.now() });
    }
  };
  ws.onclose = () => {
    WS_ALIVE = false; PING = -1;
    for (const k in ROSTER) delete ROSTER[k];
    renderHud(true);
    clearInterval(wsHb); setTimeout(wsConnect, 4000 + Math.random() * 6000);
  };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
}
try { wsConnect(); } catch (e) { /* storm stays local */ }

function pollStorm() {
  if (typeof fetch !== 'function') return;
  if (INVERT || document.hidden) { setTimeout(pollStorm, 4000); return; } // idle: paper mode / hidden tab
  fetch(PULSE + '/recent?since=' + SEEN)
    .then(r => (r.ok ? r.json() : Promise.reject(0)))
    .then(d => {
      POLL_MS = 3000; // healthy again
      const first = FIRST_POLL; FIRST_POLL = false;
      setEver(d.total);
      if (first) {
        SEEN = d.next ?? SEEN; // don't replay history on load
      } else if (Array.isArray(d.events)) {
        // renderRemote advances SEEN per event as the stagger fires — never
        // pre-bump it from d.next here, that would suppress those renders
        d.events.slice(0, 4).forEach((e, i) => setTimeout(() => renderRemote(e), i * 650));
      }
      // the socket is the realtime transport; polling idles to a slow safety
      // sync while it's alive and snaps back to 3s the moment it drops
      setTimeout(pollStorm, WS_ALIVE ? 30000 : POLL_MS);
    })
    .catch(() => {
      POLL_MS = Math.min(60000, POLL_MS * 2); // quiet exponential backoff
      setTimeout(pollStorm, WS_ALIVE ? 30000 : POLL_MS);
    });
}
try { pollStorm(); } catch (e) { /* storm stays local */ }

resize();
updateZone();
t = 7; // start mid-storm, not at noise origin
readTheme(); // sets palette + first draw
window.addEventListener('load', () => { readTheme(); updateZone(); drawFrame(t); }); // re-measure after final layout
requestAnimationFrame(loop);
</script>
